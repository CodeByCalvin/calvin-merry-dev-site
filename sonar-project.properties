# SonarCloud configuration for calvin-merry-dev-site
sonar.projectKey=CodeByCalvin_calvin-merry-dev-site
sonar.organization=codebycalvin

# Metadata
sonar.projectName=calvin-merry-dev-site
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.tsx,**/*.test.ts

# Coverage (if you add coverage later)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=ts
